name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:
    inputs:
      charts:
        description: "Comma-separated chart paths to push to OCI (e.g. charts/foo,charts/bar). Leave empty to skip OCI step."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

# Never cancel an in-flight release — partial publishes are worse than waiting.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Package and publish charts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Run chart-releaser
        id: cr
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push released charts to GHCR (OCI)
        if: steps.cr.outputs.changed_charts != ''
        uses: somaz94/helm-oci-push-action@v1
        with:
          charts: ${{ steps.cr.outputs.changed_charts }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push manually-specified charts to GHCR (OCI) [workflow_dispatch only]
        if: github.event_name == 'workflow_dispatch' && inputs.charts != ''
        uses: somaz94/helm-oci-push-action@v1
        with:
          charts: ${{ inputs.charts }}
          password: ${{ secrets.GITHUB_TOKEN }}
