{{- if and .Values.apiKey.enabled (not .Values.apiKey.existingSecret) -}}
{{- if not .Values.apiKey.value -}}
{{- fail "unity-mcp-server: apiKey.enabled is true but apiKey.value is empty. Provide apiKey.value (inline) or apiKey.existingSecret (external)." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "unity-mcp-server.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unity-mcp-server.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "unity-mcp-server.annotations" (dict "top" . "extra" .Values.resourceMetadata.secret.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.apiKey.secretKey }}: {{ .Values.apiKey.value | quote }}
{{- end }}
