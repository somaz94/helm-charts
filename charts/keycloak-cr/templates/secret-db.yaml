{{- if .Values.dbSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak-cr.dbSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak-cr.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.dbSecret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "keycloak-cr.annotations" (dict "top" . "extra" .Values.resourceMetadata.dbSecret.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.dbSecret.usernameKey }}: {{ required "dbSecret.username is required when dbSecret.enabled" .Values.dbSecret.username | quote }}
  {{ .Values.dbSecret.passwordKey }}: {{ required "dbSecret.password is required when dbSecret.enabled" .Values.dbSecret.password | quote }}
{{- end }}
