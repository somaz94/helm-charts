{{- if .Values.adminSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak-cr.adminUserSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak-cr.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.adminSecret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "keycloak-cr.annotations" (dict "top" . "extra" .Values.resourceMetadata.adminSecret.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.adminSecret.usernameKey }}: {{ required "adminSecret.username is required when adminSecret.enabled" .Values.adminSecret.username | quote }}
  {{ .Values.adminSecret.passwordKey }}: {{ required "adminSecret.password is required when adminSecret.enabled" .Values.adminSecret.password | quote }}
{{- end }}
