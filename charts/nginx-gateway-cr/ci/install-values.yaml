# Values used by CI to exercise `helm lint`, `helm template`, chart-testing
# and kubeconform. Not a deployment recipe — values below are dummy and must
# not be reused. Toggles every optional template path so each renders.
gateways:
  - name: ngf
    gatewayClassName: ngf
    http:
      enabled: true
      port: 80
    https:
      enabled: true
      port: 443
      tlsSecretName: ngf-tls
referenceGrants:
  - name: ngf-grant
    namespace: default
    from:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        namespace: nginx-gateway
    to:
      - group: ""
        kind: Service
serviceMonitor:
  namespace: monitoring
  releaseLabel: kube-prometheus-stack
  controller:
    enabled: true
  dataplane:
    enabled: true
podMonitor:
  namespace: monitoring
  releaseLabel: kube-prometheus-stack
  controller:
    enabled: true
  dataplane:
    enabled: true
