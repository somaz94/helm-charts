# Default values for mysql.
#
# The chart renders a single-node MySQL 8 Deployment + ConfigMap + Secret + PVC
# + Service, plus optional backup CronJob, NetworkPolicy, ServiceAccount and a
# chart-managed image pull Secret.
#
# Minimum required values:
#   - `auth.user`, `auth.password`, `auth.rootPassword` (when `auth.existingSecret` is empty)
#
# Topology: single-replica with `Recreate` update strategy. PVC RWO. Suits dev /
# staging / single-replica installs and legacy raw-YAML migrations (use
# `fullnameOverride` + `existingClaim` + `existingSecret` for in-place adoption).
# For HA prefer an external managed DB (RDS / CloudSQL / Vitess) — out of scope.
#
# Extensibility: every resource has a `specExtra` / `podTemplateExtra` escape
# hatch for fields not surfaced in this file. `kubernetesExtra` lets you render
# arbitrary additional manifests with the same release.

# ---------------------------------------------------------------------------
# Resource metadata
# ---------------------------------------------------------------------------
# Labels / annotations applied to every resource in this chart.
commonLabels: {}
commonAnnotations: {}

# Per-resource metadata override. Shape mirrors the rendered resource kinds so
# you can attach (e.g.) a Prometheus scrape annotation only to the Service
# without polluting the Deployment.
resourceMetadata:
  deployment:
    labels: {}
    annotations: {}
  service:
    labels: {}
    annotations: {}
  pvc:
    labels: {}
    annotations: {}
  configMap:
    labels: {}
    annotations: {}
  secret:
    labels: {}
    annotations: {}
  backupCronJob:
    labels: {}
    annotations: {}
  backupPvc:
    labels: {}
    annotations: {}
  serviceAccount:
    labels: {}
    annotations: {}
  networkPolicy:
    labels: {}
    annotations: {}

# ---------------------------------------------------------------------------
# Naming
# ---------------------------------------------------------------------------
# Release name used to derive resource names. Defaults to Helm release name.
nameOverride: ""

# Override the base name for the Deployment / Service / default PVC / default
# Secret / (when configMap.nameOverride is empty) the ConfigMap. Use this to
# adopt pre-existing resources whose names do not match the default
# `<release>-mysql` pattern (typical when migrating off raw-YAML deployments
# that named the Service `projectm-db` rather than `projectm-mysql`).
fullnameOverride: ""

configMap:
  # Override only the ConfigMap name. When empty, defaults to
  # `fullnameOverride` (or its derived value) plus `-config` suffix. Useful
  # when the legacy ConfigMap uses a different naming pattern such as
  # `<fullname>-config` vs `<fullname>`.
  nameOverride: ""

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: mysql
  tag: ""                      # empty → defaults to .Chart.AppVersion (8.0.43)
  pullPolicy: IfNotPresent

imagePullSecrets: []
# imagePullSecrets:
#   - name: my-registry-secret

# Optional chart-managed pull Secret. When create=true the chart renders a
# `kubernetes.io/dockerconfigjson` Secret and references it from every Pod in
# this release (additive to imagePullSecrets above).
# Generate dockerconfigjson with EITHER of:
#   docker login <registry> && cat ~/.docker/config.json | base64
#   kubectl create secret docker-registry tmp \
#     --docker-server=<registry> --docker-username=<user> --docker-password=<pass> \
#     --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
imagePullSecret:
  create: false
  name: ""                     # defaults to `<fullname>-pull-secret` when empty
  dockerconfigjson: ""

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 3306
  # Optional — set to expose via NodePort/LoadBalancer on a specific port.
  nodePort: null
  annotations: {}

# ---------------------------------------------------------------------------
# Persistence (PVC)
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: ""             # empty = cluster default StorageClass
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  # When set, chart skips PVC rendering and the Deployment mounts this PVC.
  # Best path for in-place migration off legacy raw-YAML deployments.
  existingClaim: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# When `existingSecret` is empty, the chart renders a Secret containing the
# four MYSQL_* keys (or whatever keys are configured under `secretKeys` below).
# When `existingSecret` is set, no Secret is rendered and the Deployment reads
# from the named Secret using the keys configured under `secretKeys`.
auth:
  user: ""
  password: ""
  database: ""                 # optional — when empty, MYSQL_DATABASE env not injected
  rootPassword: ""
  existingSecret: ""

  # Key names inside the rendered or referenced Secret. Defaults follow the
  # MySQL container's documented env var names. Override when adopting a
  # legacy Secret that uses different key names (e.g. `DB_USERNAME` instead of
  # `MYSQL_USER`) — env var names on the container stay the same; only the
  # `secretKeyRef.key` lookup changes.
  # Note: `auth.database` is rendered as a plain `value:` env, never stored in
  # the Secret — database name is generally not sensitive.
  secretKeys:
    user: MYSQL_USER
    password: MYSQL_PASSWORD
    rootPassword: MYSQL_ROOT_PASSWORD

# ---------------------------------------------------------------------------
# my.cnf — extra `[mysqld]` configuration
# ---------------------------------------------------------------------------
# Rendered into a ConfigMap and mounted at `/etc/mysql/conf.d/custom.cnf`.
# Default tuned for general workloads. NFS-backed installs should append
# `innodb_use_native_aio=0`, `innodb_flush_method=fsync`,
# `skip_external_locking=1` (see README "NFS notes").
customConfig: |
  [mysqld]
  character-set-server=utf8mb4
  collation-server=utf8mb4_unicode_ci
  default-storage-engine=INNODB
  max_allowed_packet=256M

  sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
  max_connections=500

  innodb_buffer_pool_size=512M
  innodb_buffer_pool_instances=1
  innodb_io_capacity=2000
  innodb_lock_wait_timeout=120

  thread_cache_size=100
  back_log=1024
  max_connect_errors=10000

  wait_timeout=28800
  interactive_timeout=28800
  connect_timeout=15

  log_error=/dev/stderr
  slow_query_log=1
  slow_query_log_file=/dev/stdout
  long_query_time=2

# ---------------------------------------------------------------------------
# Pod scheduling + Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

podSecurityContext: {}
securityContext: {}

# Probe defaults — `mysqladmin ping` against root with the rendered password.
# Disabled by default to avoid bootstrapping issues on first install (root
# password not yet applied during initdb). Enable after the first successful
# install.
livenessProbe: {}
readinessProbe: {}

# Arbitrary fields merged into the Deployment spec / PodTemplate.
specExtra: {}
podTemplateExtra: {}

# Free-form rendering of additional Kubernetes manifests (escape hatch).
# Each key becomes a document in the rendered output.
kubernetesExtra: {}

# ---------------------------------------------------------------------------
# Backup CronJob
# ---------------------------------------------------------------------------
# Daily mysqldump with configurable retention. Disabled by default — enable
# and set backup.persistence to retain backups. The CronJob mounts a dedicated
# backup PVC and reads the same auth Secret as the MySQL Pod.
backup:
  enabled: false
  # CronJob schedule (cluster timezone). Default = 03:00 KST (UTC+9) = 18:00 UTC.
  schedule: "0 18 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  retentionDays: 30
  image:
    # By default, reuses `.image.*` for `mysqldump` (empty = inherit).
    # Override to pin a specific client image (e.g. `mysql/mysql-shell`).
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  resources: {}
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    existingClaim: ""
    annotations: {}
  specExtra: {}
  jobTemplateExtra: {}

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
# Optional — render a dedicated SA and wire it to the Pod via
# serviceAccountName. Useful for IRSA / Workload Identity, or to scope
# imagePullSecrets to this release. Default off: pods use the `default` SA.
serviceAccount:
  create: false
  name: ""                     # empty → <fullname>
  annotations: {}
  imagePullSecrets: []
  automountServiceAccountToken: true

# ---------------------------------------------------------------------------
# NetworkPolicy
# ---------------------------------------------------------------------------
# Lock down traffic to/from the MySQL pods. Opt-in; renders a single
# networking.k8s.io/v1 NetworkPolicy when enabled. `ingress` and `egress`
# take native NetworkPolicy shapes (arrays of rules). Empty with policyTypes
# set = deny-all for that direction.
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
  # Override the pod selector; defaults to this release's selectorLabels.
  podSelector: {}
