{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keycloak-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak-operator.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $mergedAnn := merge (deepCopy (default (dict) .Values.serviceAccount.annotations)) (deepCopy (default (dict) .Values.resourceMetadata.serviceAccount.annotations)) (deepCopy (default (dict) .Values.commonAnnotations)) }}
  {{- if $mergedAnn }}
  annotations:
    {{- toYaml $mergedAnn | nindent 4 }}
  {{- end }}
{{- end }}
