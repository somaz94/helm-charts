apiVersion: v2
name: kibana-eck
description: Kibana Custom Resource for ECK (Elastic Cloud on Kubernetes) with HTTPRoute, Ingress and PDB wrappers. Connects to an Elasticsearch CR deployed via elasticsearch-eck.
type: application
version: 0.1.1
appVersion: "9.3.3"
kubeVersion: ">=1.25.0-0"
keywords:
  - kibana
  - elastic
  - eck
  - elastic-cloud-on-kubernetes
  - observability
  - logging
  - dashboard
  - kubernetes
home: https://github.com/somaz94/helm-charts
sources:
  - https://github.com/somaz94/helm-charts
  - https://github.com/elastic/cloud-on-k8s
maintainers:
  - name: somaz94
    url: https://github.com/somaz94
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/somaz94/helm-charts
    - name: ECK Documentation
      url: https://www.elastic.co/guide/en/cloud-on-k8s/current/index.html
    - name: Kibana Release Notes
      url: https://www.elastic.co/guide/en/kibana/current/release-notes.html
  artifacthub.io/prerelease: "false"
  artifacthub.io/changes: |
    - kind: added
      description: Initial release. Kibana ECK CR with podTemplate extensibility, HTTPRoute, legacy Ingress, PodDisruptionBudget, and elasticsearchRef auto-wiring.
    - kind: fixed
      description: Correct artifacthub.io/category to `monitoring-logging` (was `monitoring`, rejected by ArtifactHub).
