{{- if .Values.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kibana-eck.fullname" . }}
  namespace: {{ .Values.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "kibana-eck.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.releaseLabel }}
    release: {{ . }}
    {{- end }}
    {{- with .Values.resourceMetadata.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "kibana-eck.annotations" (dict "top" . "extra" .Values.resourceMetadata.serviceMonitor.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.serviceMonitor.selector }}
  selector:
    {{- toYaml .Values.serviceMonitor.selector | nindent 4 }}
  {{- else }}
  selector:
    matchLabels:
      common.k8s.elastic.co/type: kibana
      kibana.k8s.elastic.co/name: {{ include "kibana-eck.fullname" . }}
  {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    {{- if .Values.serviceMonitor.endpoints }}
    {{- toYaml .Values.serviceMonitor.endpoints | nindent 4 }}
    {{- else }}
    - port: http
      path: /api/status
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      scheme: http
      basicAuth:
        username:
          name: {{ .Values.elasticsearchRef.name }}-es-elastic-user
          key: elastic
        password:
          name: {{ .Values.elasticsearchRef.name }}-es-elastic-user
          key: elastic
    {{- end }}
{{- end }}
