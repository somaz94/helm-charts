{{- range .Values.referenceGrants }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kibana-eck.labels" $ | nindent 4 }}
    {{- with $.Values.resourceMetadata.referenceGrant.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "kibana-eck.annotations" (dict "top" $ "extra" $.Values.resourceMetadata.referenceGrant.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  from:
    {{- range .from }}
    - group: {{ .group | default "" | quote }}
      kind:  {{ .kind }}
      namespace: {{ .namespace }}
    {{- end }}
  to:
    {{- range .to }}
    - group: {{ .group | default "" | quote }}
      kind:  {{ .kind }}
      {{- if .name }}
      name: {{ .name }}
      {{- else if eq .kind "Service" }}
      name: {{ include "kibana-eck.httpServiceName" $ }}
      {{- end }}
    {{- end }}
{{- end }}
