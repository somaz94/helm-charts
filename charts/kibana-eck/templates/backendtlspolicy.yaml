{{- /*
BackendTLSPolicy for Kibana — points directly at the CA source (Secret or
ConfigMap) so `helm diff` / `helmfile diff` render deterministically.

Default is the ECK-managed Secret `<name>-kb-http-certs-public`, which already
contains `ca.crt`. NGF supports Secret kind for caCertificateRefs; Gateway API
Core only mandates ConfigMap, so switch to `kind: ConfigMap` and manage the
ConfigMap out-of-band if your Gateway implementation requires it.
*/ -}}
{{- if and .Values.httproute.enabled .Values.backendTLSPolicy.enabled }}
{{- $refKind := .Values.backendTLSPolicy.caCertificateRef.kind | default "Secret" }}
{{- $refName := .Values.backendTLSPolicy.caCertificateRef.name }}
{{- if not $refName }}
  {{- if eq $refKind "Secret" }}
    {{- $refName = printf "%s-kb-http-certs-public" (include "kibana-eck.fullname" .) }}
  {{- else }}
    {{- $refName = printf "%s-ca" (include "kibana-eck.fullname" .) }}
  {{- end }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ include "kibana-eck.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kibana-eck.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.backendTLSPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "kibana-eck.annotations" (dict "top" . "extra" .Values.resourceMetadata.backendTLSPolicy.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ include "kibana-eck.httpServiceName" . }}
  validation:
    caCertificateRefs:
      - group: ""
        kind: {{ $refKind }}
        name: {{ $refName }}
    hostname: {{ include "kibana-eck.httpServiceName" . }}
{{- end }}
