apiVersion: v2
name: elasticsearch-eck
description: Elasticsearch Custom Resource for ECK (Elastic Cloud on Kubernetes) with HTTPRoute, BackendTLSPolicy, PDB and ServiceMonitor wrappers. Defaults to a single-node cluster; HA via nodeSets.
type: application
version: 0.1.2
appVersion: "9.3.3"
kubeVersion: ">=1.25.0-0"
keywords:
  - elasticsearch
  - elastic
  - eck
  - elastic-cloud-on-kubernetes
  - observability
  - logging
  - kubernetes
home: https://github.com/somaz94/helm-charts
sources:
  - https://github.com/somaz94/helm-charts
  - https://github.com/elastic/cloud-on-k8s
maintainers:
  - name: somaz94
    url: https://github.com/somaz94
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/somaz94/helm-charts
    - name: ECK Documentation
      url: https://www.elastic.co/guide/en/cloud-on-k8s/current/index.html
    - name: Elasticsearch Release Notes
      url: https://www.elastic.co/guide/en/elasticsearch/reference/current/release-notes.html
  artifacthub.io/prerelease: "false"
  artifacthub.io/changes: |
    - kind: added
      description: Initial release. Elasticsearch ECK CR with nodeSets[] array, optional elastic-user Secret, HTTPRoute, BackendTLSPolicy, PodDisruptionBudget and ServiceMonitor.
    - kind: fixed
      description: Correct artifacthub.io/category to `monitoring-logging` (was `monitoring`, rejected by ArtifactHub).
    - kind: removed
      description: Unused `elasticsearch-eck.resourceLabels` helper in `_helpers.tpl`. Dead code since 0.1.0 — templates use inline `with .Values.resourceMetadata.<key>.labels`. Pure refactor, zero functional change.
