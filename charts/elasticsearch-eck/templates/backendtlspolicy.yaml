{{- /*
BackendTLSPolicy + CA ConfigMap — verifies ECK's self-signed HTTPS cert from
a Gateway HTTPRoute. Uses `lookup` to copy the CA out of the ECK-managed Secret
`<name>-es-http-certs-public`. The Secret is created by the ECK operator after
the Elasticsearch CR is reconciled, so on first install this resource silently
no-ops (template renders only when the Secret already exists). Re-run
`helm upgrade` after ES is Ready to render it.
*/ -}}
{{- if and .Values.httproute.enabled .Values.backendTLSPolicy.enabled }}
{{- $secretName := include "elasticsearch-eck.httpCertsSecretName" . }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if $secret }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elasticsearch-eck.caConfigMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elasticsearch-eck.labels" . | nindent 4 }}
    elasticsearch.k8s.elastic.co/source-secret: {{ $secretName }}
    {{- with .Values.resourceMetadata.backendTLSPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "elasticsearch-eck.annotations" (dict "top" . "extra" .Values.resourceMetadata.backendTLSPolicy.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
data:
  ca.crt: |
{{ index $secret.data "ca.crt" | b64dec | indent 4 }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ include "elasticsearch-eck.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elasticsearch-eck.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.backendTLSPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ include "elasticsearch-eck.httpServiceName" . }}
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: {{ include "elasticsearch-eck.caConfigMapName" . }}
    hostname: {{ include "elasticsearch-eck.httpServiceName" . }}
{{- end }}
{{- end }}
