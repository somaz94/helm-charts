{{- /*
BackendTLSPolicy — verifies ECK's self-signed HTTPS cert from a Gateway
HTTPRoute. Points directly at the CA source (Secret or ConfigMap) so the
template is pure and `helm diff` / `helmfile diff` render deterministically.

Default is the ECK-managed Secret `<name>-es-http-certs-public`, which already
contains `ca.crt`. NGF supports Secret kind for caCertificateRefs; Gateway API
Core only mandates ConfigMap, so switch to `kind: ConfigMap` and manage the
ConfigMap out-of-band if your Gateway implementation requires it.
*/ -}}
{{- if and .Values.httproute.enabled .Values.backendTLSPolicy.enabled }}
{{- $refKind := .Values.backendTLSPolicy.caCertificateRef.kind | default "Secret" }}
{{- $refName := .Values.backendTLSPolicy.caCertificateRef.name }}
{{- if not $refName }}
  {{- if eq $refKind "Secret" }}
    {{- $refName = include "elasticsearch-eck.httpCertsSecretName" . }}
  {{- else }}
    {{- $refName = printf "%s-ca" (include "elasticsearch-eck.fullname" .) }}
  {{- end }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ include "elasticsearch-eck.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elasticsearch-eck.labels" . | nindent 4 }}
    {{- with .Values.resourceMetadata.backendTLSPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "elasticsearch-eck.annotations" (dict "top" . "extra" .Values.resourceMetadata.backendTLSPolicy.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: {{ include "elasticsearch-eck.httpServiceName" . }}
  validation:
    caCertificateRefs:
      - group: ""
        kind: {{ $refKind }}
        name: {{ $refName }}
    hostname: {{ include "elasticsearch-eck.httpServiceName" . }}
{{- end }}
