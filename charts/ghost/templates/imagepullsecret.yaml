{{- if .Values.imagePullSecret.create -}}
{{- if not .Values.imagePullSecret.dockerconfigjson -}}
{{- fail "ghost: imagePullSecret.create=true requires .imagePullSecret.dockerconfigjson (base64-encoded ~/.docker/config.json)." -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ghost.imagePullSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.imagePullSecret.dockerconfigjson }}
{{- end -}}
