{{- if and (not .Values.mysql.enabled) (not .Values.externalDatabase.host) -}}
{{- fail "ghost: mysql.enabled is false but externalDatabase.host is empty. Set mysql.enabled=true or externalDatabase.host." -}}
{{- end -}}
{{- if not .Values.url -}}
{{- fail "ghost: .Values.url is required (e.g. https://blog.example.com)." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ghost.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghost
    {{- with .Values.resourceMetadata.ghostDeployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "ghost.annotations" (dict "top" . "extra" .Values.resourceMetadata.ghostDeployment.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ghost.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "ghost.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "ghost.fullname" .) }}
      {{- else if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: ghost
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "%s-alpine" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: url
              value: {{ .Values.url | quote }}
            - name: database__client
              value: mysql
            - name: database__connection__host
              value: {{ include "ghost.databaseHost" . | quote }}
            - name: database__connection__port
              value: {{ include "ghost.databasePort" . | quote }}
            - name: database__connection__user
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.database.secretName" . }}
                  key: MYSQL_USER
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.database.secretName" . }}
                  key: MYSQL_PASSWORD
            - name: database__connection__database
              valueFrom:
                secretKeyRef:
                  name: {{ include "ghost.database.secretName" . }}
                  key: MYSQL_DATABASE
            {{- if .Values.uploads.maxFileSize }}
            - name: fileStorage__maxFileSize
              value: {{ printf "%d" (int64 .Values.uploads.maxFileSize) | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: content
              mountPath: /var/lib/ghost/content
      volumes:
        - name: content
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-content" (include "ghost.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.podTemplateExtra }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
  {{- with .Values.specExtra }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ghost.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghost
    {{- with .Values.resourceMetadata.ghostService.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $svcAnn := include "ghost.annotations" (dict "top" . "extra" (merge (deepCopy (default (dict) .Values.service.annotations)) (deepCopy (default (dict) .Values.resourceMetadata.ghostService.annotations)))) }}
  {{- if $svcAnn }}
  annotations:
    {{- $svcAnn | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "ghost.selectorLabels" . | nindent 4 }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ghost.fullname" . }}-content
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
    app.kubernetes.io/component: ghost
    {{- with .Values.resourceMetadata.ghostPvc.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $pvcAnn := include "ghost.annotations" (dict "top" . "extra" (merge (deepCopy (default (dict) .Values.persistence.annotations)) (deepCopy (default (dict) .Values.resourceMetadata.ghostPvc.annotations)))) }}
  {{- if $pvcAnn }}
  annotations:
    {{- $pvcAnn | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
