apiVersion: v2
name: redis
description: Standalone single-node Redis — Deployment + optional Secret + optional ConfigMap (redis.conf) + PVC + Service, NetworkPolicy, ServiceAccount. Recreate strategy. No backup CronJob (Redis is typically a cache; if you need persistence + offsite backups, prefer Sentinel/Cluster topology). Suits dev/staging single-replica installs and legacy raw-YAML migrations (existingClaim / existingSecret / fullnameOverride for in-place adoption). Sibling chart to `valkey-cr` — choose by license / compatibility preference.
type: application
version: 0.1.0
appVersion: "8.2-alpine"
kubeVersion: ">=1.25.0-0"
keywords:
  - redis
  - cache
  - kv-store
  - kubernetes
home: https://github.com/somaz94/helm-charts
sources:
  - https://github.com/somaz94/helm-charts
  - https://hub.docker.com/_/redis
maintainers:
  - name: somaz94
    url: https://github.com/somaz94
annotations:
  artifacthub.io/category: database
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/somaz94/helm-charts
    - name: Redis Docker image
      url: https://hub.docker.com/_/redis
    - name: Redis documentation
      url: https://redis.io/docs/
  artifacthub.io/prerelease: "false"
  artifacthub.io/changes: |
    - kind: added
      description: "Initial release. Standalone single-node Redis with optional ConfigMap (redis.conf), optional Secret (auth password), PVC, Deployment (Recreate strategy), Service (ClusterIP/NodePort), NetworkPolicy, ServiceAccount, image pull Secret (chart-managed dockerconfigjson + BYOIPS), kubernetesExtra escape hatch. Default image tracks Redis 8.2 (RSALv2/SSPL); pin `image.tag: 7.4-alpine` to remain on the last BSD-licensed release."
    - kind: added
      description: "`auth.existingSecret` + `auth.passwordKey` for adopting legacy Secrets that hold the Redis password under non-standard keys."
    - kind: added
      description: "`fullnameOverride` and `configMap.nameOverride` to adopt pre-existing resources whose names do not fit the chart default."
    - kind: added
      description: "`persistence.{enabled,existingClaim,mountPath}` for PVC reuse and non-standard mount paths (e.g. `/redis-master-data` from legacy raw YAML)."
