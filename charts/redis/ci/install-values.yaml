# Values used by CI to exercise `helm lint`, `helm template`, chart-testing
# and kubeconform. Not a deployment recipe — credentials below are dummy and
# must not be reused.
auth:
  enabled: true
  password: ci-test-password
customConfig: |
  maxmemory 256mb
  maxmemory-policy allkeys-lru
  appendonly yes
serviceAccount:
  create: true
networkPolicy:
  enabled: true
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ci-app
      ports:
        - protocol: TCP
          port: 6379
imagePullSecret:
  create: true
  dockerconfigjson: eyJhdXRocyI6IHt9fQ==
