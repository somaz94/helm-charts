{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) -}}
{{- if not .Values.auth.password -}}
{{- fail "redis: auth.password is required when auth.enabled is true and auth.existingSecret is empty." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "redis.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
    {{- with .Values.resourceMetadata.secret.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $ann := include "redis.annotations" (dict "top" . "extra" .Values.resourceMetadata.secret.annotations) }}
  {{- if $ann }}
  annotations:
    {{- $ann | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.auth.passwordKey }}: {{ .Values.auth.password | quote }}
{{- end }}
