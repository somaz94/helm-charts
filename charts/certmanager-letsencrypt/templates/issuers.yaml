{{- $top := . -}}
{{- range $i := .Values.issuers -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $i.name }}
  namespace: {{ $i.namespace }}
  labels:
    {{- include "certmanager-letsencrypt.labels" $top | nindent 4 }}
    {{- with $i.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annot := include "certmanager-letsencrypt.annotations" (dict "top" $top "extra" $i.annotations) }}
  {{- if $annot }}
  annotations:
    {{- $annot | nindent 4 }}
  {{- end }}
spec:
  acme:
    email: {{ $i.email }}
    server: {{ $i.server }}
    privateKeySecretRef:
      name: {{ default (printf "%s-account-key" $i.name) $i.privateKeySecretRef }}
    solvers:
      {{- toYaml $i.solvers | nindent 6 }}
---
{{ end -}}
