{{- $top := . -}}
{{- range $ing := .Values.ingresses -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ing.name }}
  namespace: {{ $ing.namespace }}
  labels:
    {{- include "certmanager-letsencrypt.labels" $top | nindent 4 }}
    {{- with $ing.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annot := include "certmanager-letsencrypt.annotations" (dict "top" $top "extra" $ing.annotations) }}
  {{- if $annot }}
  annotations:
    {{- $annot | nindent 4 }}
  {{- end }}
spec:
  {{- with $ing.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $ing.rules }}
  rules:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $ing.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{ end -}}
