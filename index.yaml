    name: elasticsearch-eck
    sources:
    - https://github.com/somaz94/helm-charts
    - https://github.com/elastic/cloud-on-k8s
    type: application
    urls:
    - https://github.com/somaz94/helm-charts/releases/download/elasticsearch-eck-0.1.6/elasticsearch-eck-0.1.6.tgz
    version: 0.1.6
  - annotations:
      artifacthub.io/category: monitoring-logging
      artifacthub.io/changes: |
        - kind: added
          description: Initial release. Elasticsearch ECK CR with nodeSets[] array, optional elastic-user Secret, HTTPRoute, BackendTLSPolicy, PodDisruptionBudget and ServiceMonitor.
        - kind: fixed
          description: Correct artifacthub.io/category to `monitoring-logging` (was `monitoring`, rejected by ArtifactHub).
        - kind: removed
          description: Unused `elasticsearch-eck.resourceLabels` helper in `_helpers.tpl`. Dead code since 0.1.0 — templates use inline `with .Values.resourceMetadata.<key>.labels`. Pure refactor, zero functional change.
        - kind: changed
          description: "BREAKING for non-NGF Gateway implementations. BackendTLSPolicy now references the ECK-managed Secret `<name>-es-http-certs-public` directly via `caCertificateRefs`, eliminating the `lookup`-based CA ConfigMap copy. `helm diff` / `helmfile diff` now render deterministically. Migration: NGINX Gateway Fabric users — no action. Gateway API Core-only implementations (which do not support Secret kind in caCertificateRefs) — set `backendTLSPolicy.caCertificateRef.kind: ConfigMap` and provision the ConfigMap out-of-band (e.g. via Reflector or External Secrets)."
        - kind: removed
          description: The auto-generated `<name>-ca` ConfigMap and the `caConfigMapName` helper. Existing installs will leave an orphaned ConfigMap — safe to delete manually once BackendTLSPolicy is reconciled against the Secret.
        - kind: fixed
          description: "DO NOT USE 0.1.3 — NGINX Gateway Fabric rejects `type: Opaque` Secrets for `caCertificateRefs`, so the 0.1.3 default (`kind: Secret`) breaks BTP resolution against ECK (which ships Opaque Secrets). 0.1.4 reverts to the 0.1.2 behavior: `caCertificateRef.kind: ConfigMap` with chart-rendered CA ConfigMap via `helm lookup`. The `caCertificateRef` values block is retained for advanced consumers — `kind: Secret` + `type: kubernetes.io/tls`, or consumer-managed external ConfigMap via `name: <custom>`. README documents the helm-diff lookup limitation as a known trade-off."
        - kind: added
          description: '`caConfigMapName` helper restored in `_helpers.tpl`. `_helpers.tpl` comments clarify the ConfigMap source-of-truth relationship.'
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
        - name: Source
          url: https://github.com/somaz94/helm-charts
        - name: ECK Documentation
          url: https://www.elastic.co/guide/en/cloud-on-k8s/current/index.html
        - name: Elasticsearch Release Notes
          url: https://www.elastic.co/guide/en/elasticsearch/reference/current/release-notes.html
      artifacthub.io/prerelease: "false"
