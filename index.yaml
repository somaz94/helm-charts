  - annotations:
      artifacthub.io/category: monitoring-logging
      artifacthub.io/changes: |
        - kind: added
          description: Initial release. Kibana ECK CR with podTemplate extensibility, HTTPRoute, legacy Ingress, PodDisruptionBudget, and elasticsearchRef auto-wiring.
        - kind: fixed
          description: Correct artifacthub.io/category to `monitoring-logging` (was `monitoring`, rejected by ArtifactHub).
        - kind: changed
          description: "BREAKING for non-NGF Gateway implementations. BackendTLSPolicy now references the ECK-managed Secret `<name>-kb-http-certs-public` directly via `caCertificateRefs`, eliminating the `lookup`-based CA ConfigMap copy. `helm diff` / `helmfile diff` now render deterministically. Migration: NGINX Gateway Fabric users — no action. Gateway API Core-only implementations (which do not support Secret kind in caCertificateRefs) — set `backendTLSPolicy.caCertificateRef.kind: ConfigMap` and provision the ConfigMap out-of-band."
        - kind: removed
          description: The auto-generated `<name>-ca` ConfigMap. Existing installs will leave an orphaned ConfigMap — helm garbage-collects it on upgrade.
        - kind: fixed
          description: "DO NOT USE 0.1.2 — same NGF Opaque Secret rejection as elasticsearch-eck 0.1.3. 0.1.3 reverts to the 0.1.1 behavior: `caCertificateRef.kind: ConfigMap` with chart-rendered CA ConfigMap via `helm lookup`. The `caCertificateRef` values block is retained for advanced consumers — `kind: Secret` requires a `kubernetes.io/tls`-typed Secret, or use consumer-managed external ConfigMap via `name: <custom>`. README documents the helm-diff lookup limitation as a known trade-off."
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
        - name: Source
          url: https://github.com/somaz94/helm-charts
        - name: ECK Documentation
          url: https://www.elastic.co/guide/en/cloud-on-k8s/current/index.html
        - name: Kibana Release Notes
          url: https://www.elastic.co/guide/en/kibana/current/release-notes.html
      artifacthub.io/prerelease: "false"
